spring:
  application:
    name: smart-project-gateway
  ldap:
    urls: ldap://localhost:389
    base: dc=maxcrc,dc=com
    username: cn=Manager,dc=maxcrc,dc=com
    password: secret
  datasource:
    druid:
      username: root
      password: root
      url: jdbc:mysql://192.168.204.129:3306/test?characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&socketTimeout=10000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai
      driver-class-name: com.mysql.cj.jdbc.Driver
      connection-properties: config.decrypt=false;
  devtools:
    restart:
      enabled : true
      additional-paths : src/main/java
      exclude : static/**,public/**
  redis:
    host: 192.168.204.129
    port: 6379
    password: admin
  thymeleaf:
    cache: false

logging:
  level:
    com.example.project.dao.mapper: DEBUG

server:
  port: 8600
mybatis:
  mapper-locations: classpath :**/*.xml
  configuration:
    map-underscore-to-camel-case: true
async:
  executor:
    thread:
      max_pool_size: 3
      core_pool_size: 2
      queue_capacity: 5
      name:
        prefix: importDate